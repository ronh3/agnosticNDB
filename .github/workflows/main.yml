name: Build project using muddler and upload artifact

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: test (${{ matrix.spec_name }})
    permissions: write-all
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - spec_path: tests/agnosticdb_honors_spec.lua
            spec_name: agnosticdb_honors_spec.lua
            upload_artifact: true
    env:
      MUDLET_RELEASE_TAG: ci-asset
      MUDLET_RELEASE_ASSET: Mudlet-4.20.1-linux-x64.AppImage.tar

    steps:
      - uses: actions/checkout@v4

      - name: Read package metadata
        id: pkg
        run: |
          VERSION=$(jq -r '.version' mfile)
          PACKAGE=$(jq -r '.package' mfile)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "package=$PACKAGE" >> "$GITHUB_OUTPUT"

      - name: Muddle
        uses: demonnic/build-with-muddler@main

      - name: Detect package file for Mudlet tests
        id: package_file
        run: |
          set -eu
          PACKAGE="${{ steps.pkg.outputs.package }}"

          for candidate in \
            "build/tmp/${PACKAGE}.xml" \
            "build/${PACKAGE}.xml" \
            "build/${PACKAGE}.mpackage"
          do
            if [ -f "$candidate" ]; then
              echo "path=$candidate" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          echo "Unable to locate a Mudlet package artifact for tests."
          find build -maxdepth 3 -type f | sort || true
          exit 1

      - name: Set up Lua
        uses: leafo/gh-actions-lua@v8.0.0
        with:
          luaVersion: "5.1.5"

      - name: Set up LuaRocks
        uses: leafo/gh-actions-luarocks@v4.0.0

      - name: Install test dependencies
        run: |
          luarocks install busted
          sudo apt-get update
          sudo apt-get install -y libfuse2 libopengl0 libegl1

      - name: Restore cached Mudlet AppImage
        uses: actions/cache@v4
        id: cache-mudlet
        with:
          path: /tmp/Mudlet.AppImage
          key: mudlet-release-${{ env.MUDLET_RELEASE_TAG }}-${{ env.MUDLET_RELEASE_ASSET }}

      - name: Download Mudlet AppImage
        if: steps.cache-mudlet.outputs.cache-hit != 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          release_api="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${MUDLET_RELEASE_TAG}"
          asset_api_url=$(curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "$release_api" \
            | jq -r --arg name "${MUDLET_RELEASE_ASSET}" '.assets[] | select(.name == $name) | .url')
          if [ -z "$asset_api_url" ] || [ "$asset_api_url" = "null" ]; then
            echo "Failed to find release asset ${MUDLET_RELEASE_ASSET} on tag ${MUDLET_RELEASE_TAG}"
            exit 1
          fi
          curl -L --fail --retry 5 --retry-delay 2 --retry-all-errors \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/octet-stream" \
            "$asset_api_url" -o /tmp/Mudlet.tar
          tar tf /tmp/Mudlet.tar >/dev/null
          tar xf /tmp/Mudlet.tar -C /tmp
          chmod +x /tmp/Mudlet.AppImage

      - name: Install Mudlet test profile
        run: |
          git clone --depth 1 https://github.com/demonnic/test-in-mudlet.git /tmp/test-in-mudlet
          mkdir -p "$HOME/.config/mudlet/profiles"
          cp -r /tmp/test-in-mudlet/profiles/GithubTests "$HOME/.config/mudlet/profiles/"
          profile_xml=$(find "$HOME/.config/mudlet/profiles/GithubTests/current" -name '*.xml' | head -n 1)
          if [ -z "$profile_xml" ]; then
            echo "Unable to locate GithubTests profile XML"
            exit 1
          fi
          perl -0pi -e "s/options\\.verbose = false/options.verbose = true/" "$profile_xml"

      - name: Prepare Mudlet test runner
        run: |
          cat >/tmp/run-mudlet-tests.sh <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          root_tests_dir="${TESTS_DIRECTORY:?TESTS_DIRECTORY must be set}"
          spec_path="${SPEC_PATH:?SPEC_PATH must be set}"
          spec_name="$(basename "$spec_path")"
          support_dir="$root_tests_dir/support"
          run_dir="/tmp/agnosticdb-single-spec"

          rm -rf "$run_dir"
          mkdir -p "$run_dir"
          cp "$spec_path" "$run_dir/"
          cp -R "$support_dir" "$run_dir/"

          export TESTS_DIRECTORY="$run_dir"
          rm -f /tmp/busted-tests-failed /tmp/mudlet.raw.log

          python - <<'PY'
from pathlib import Path
import os
import subprocess

spec_name = os.environ["SPEC_NAME"]

with open("/tmp/mudlet.raw.log", "w", encoding="utf-8") as handle:
    proc = subprocess.run(
        ["/tmp/Mudlet.AppImage", "--profile", "GithubTests", "--mirror"],
        stdout=handle,
        stderr=subprocess.STDOUT,
        text=True,
        check=False,
    )

lines = Path("/tmp/mudlet.raw.log").read_text(errors="replace").splitlines()
i = 0
while i < len(lines):
    line = lines[i]
    if 'XMLimport::readUnknownElement(' in line and 'UNKNOWN Package Element name: "path".' in line:
        i += 4
        continue
    print(line)
    i += 1

if proc.returncode != 0:
    Path("/tmp/busted-tests-failed").write_text(f"{spec_name} (Mudlet exited with status {proc.returncode})\n")
PY
          EOF
          chmod +x /tmp/run-mudlet-tests.sh

      - name: Run Busted tests in Mudlet
        uses: GabrielBB/xvfb-action@v1.6
        with:
          run: bash /tmp/run-mudlet-tests.sh
        env:
          AUTORUN_BUSTED_TESTS: "true"
          TESTS_DIRECTORY: ${{ github.workspace }}/tests
          SPEC_PATH: ${{ github.workspace }}/${{ matrix.spec_path }}
          SPEC_NAME: ${{ matrix.spec_name }}
          QUIT_MUDLET_AFTER_TESTS: "true"
          PRETEST_PACKAGE: ${{ steps.package_file.outputs.path }}

      - name: Check Busted result
        run: |
          if [ -e /tmp/busted-tests-failed ]; then
            failed_spec=$(cat /tmp/busted-tests-failed)
            echo "::error title=Lua busted tests failed::${failed_spec}"
            echo "Lua tests failed in ${failed_spec}."
            echo ""
            echo "---- /tmp/busted-tests-failed ----"
            cat /tmp/busted-tests-failed || true
            echo ""
            echo "---- tail /tmp/mudlet.raw.log ----"
            tail -n 200 /tmp/mudlet.raw.log || true
            exit 1
          fi

      - name: Upload Mudlet test log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mudlet-test-log-${{ matrix.spec_name }}
          path: /tmp/mudlet.raw.log

      - name: Upload Artifact
        if: ${{ matrix.upload_artifact }}
        uses: actions/upload-artifact@v4
        id: upload
        with:
          name: ${{ steps.pkg.outputs.package }}-${{ steps.pkg.outputs.version }}
          path: build/tmp/

      - name: Post Artifact
        if: ${{ github.event_name == 'pull_request' }}
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |-
            ## Build preview
            You can get it [here](${{ steps.upload.outputs.artifact-url }})
            ![badge](https://img.shields.io/badge/Build-Success!-3fb950?logo=github&style=for-the-badge)
